# Docker Compose para probar el módulo service_quote_manager en Odoo 17.0
# Uso:
#   docker compose up -d
#   docker compose run --rm odoo odoo -d sqm_demo -i service_quote_manager --stop-after-init
# Ver la guía completa en service_quote_manager/INSTALL_TESTING.md

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo
    volumes:
      - odoo-db:/var/lib/postgresql/data

  odoo:
    image: odoo:17.0
    depends_on:
      - db
    ports:
      - "8069:8069"
    environment:
      HOST: db
      USER: odoo
      PASSWORD: odoo
    volumes:
      # /mnt/extra-addons ya está en el addons_path por defecto de la imagen 17.0.
      # La ruta destino debe terminar en /service_quote_manager (completa, sin cortar).
      - ./service_quote_manager:/mnt/extra-addons/service_quote_manager

volumes:
  odoo-db:
